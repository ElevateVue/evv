<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Queue • EVV</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
  <script defer src="client-hub-tracker.js"></script>
  <script defer src="footer.js"></script>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand"><img src="/logo.png" alt="EVV" class="brand-badge" /><div><div class="brand-name">Elevate</div><div class="brand-sub">vue</div></div><button class="icon-btn" id="closeSidebar">×</button></div>
    <nav class="side-nav">
      <div class="nav-label">Navigation</div>
      <a class="nav-link" href="featurehub.html">Feature Hub</a>
      <a class="nav-link" href="dashboard-overview.html">Dashboard</a>
      <a class="nav-link" href="connect.html">Connect</a>
      <a class="nav-link" href="upload.html">Scheduling</a>
      <a class="nav-link active" href="post-queue.html">Post Queue</a>
      <a class="nav-link" href="report.html">Report</a>
    </nav>
    <div class="account-card"><div class="avatar">S</div><div><div class="name">Demo User</div><div class="email">demo@user.com</div></div></div>
  </aside>
  <div class="page">
    <header class="topbar">
      <button class="icon-btn" id="openSidebar">☰</button>
      <div class="brand-inline"><img src="/logo.png" alt="EVV" class="brand-badge" /><div class="brand-name">Elevate <span class="brand-sub">vue</span></div></div>
      <div class="spacer"></div>
      <div class="avatar small">S</div>
    </header>
    <main>
      <section class="panel">
        <div class="panel-head">
          <div>
            <h1>Post Queue</h1>
            <p>Review scheduled posts and manage approval status in one long queue view.</p>
          </div>
          <div class="header-actions">
            <a href="upload.html" class="pill-btn outline small">New Post</a>
          </div>
        </div>

        <div class="card preview-panel">
          <div class="section-header"><h2>Queued Posts</h2><span id="queueCount" class="badge">0</span></div>
          <div id="postQueueList" class="queue-list"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal" id="modal">
    <div class="modal-header"><h3>Login to <span id="modalPlatform"></span></h3><button class="icon-btn" id="modalClose">×</button></div>
    <form id="modalForm" class="modal-body">
      <label>Username / Email</label><input id="modalUser" required />
      <label>Password</label><input id="modalPass" type="password" required />
      <button class="btn-outline full" type="submit">Save</button>
    </form>
  </div>
  <div class="beams-overlay"></div>
</body>
</html>
