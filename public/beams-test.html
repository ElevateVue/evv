<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Beams Background Test</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap');

    body {
      margin: 0;
      font-family: 'Roboto Slab', serif;
      font-size: 28px;
      font-weight: 400;
      background: transparent;
      color: white;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0c1017;
      z-index: -2;
    }

    .beams-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(12, 16, 23, 0.3);
      backdrop-filter: blur(1px);
      z-index: -1;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
      text-align: center;
      animation: slideUpFade 1s ease-out forwards;
    }

    h1 {
      font-size: 22px;
      line-height: 1.3;
      font-weight: 400;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #7c6ad7, #4dc9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(40px);
      animation: slideUpFade 0.9s ease-out forwards;
      animation-delay: 0.1s;
    }

    h2 {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.35;
    }

    h3 {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.4;
    }

    p {
      font-size: 28px;
      line-height: 1.5;
      opacity: 0;
      max-width: 720px;
      animation: slideUpFade 1s ease-out forwards;
      animation-delay: 0.3s;
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="beams-overlay"></div>

  <div class="content">
    <h1>Beams Background</h1>
    <p>Animated beams flowing across the screen as a dynamic background effect</p>
  </div>

  <script>
    // Animated Beams Background Class
    class BeamsBackground {
      constructor(options = {}) {
        this.options = {
          intensity: options.intensity || 'strong',
          blur: options.blur || 35,
          minBeams: options.minBeams || 20,
          ...options
        };

        this.canvas = null;
        this.ctx = null;
        this.beams = [];
        this.animationFrame = null;
        this.opacityMap = {
          subtle: 0.7,
          medium: 0.85,
          strong: 1
        };

        this.init();
      }

      init() {
        this.createCanvas();
        this.setupBeams();
        this.bindEvents();
        this.animate();
      }

      createCanvas() {
        // Remove existing canvas if any
        const existingCanvas = document.getElementById('beams-canvas');
        if (existingCanvas) {
          existingCanvas.remove();
        }

        this.canvas = document.createElement('canvas');
        this.canvas.id = 'beams-canvas';
        this.canvas.style.position = 'fixed';
        this.canvas.style.top = '0';
        this.canvas.style.left = '0';
        this.canvas.style.width = '100%';
        this.canvas.style.height = '100%';
        this.canvas.style.pointerEvents = 'none';
        this.canvas.style.zIndex = '-1';
        this.canvas.style.filter = `blur(${this.options.blur}px)`;

        document.body.insertBefore(this.canvas, document.body.firstChild);

        this.ctx = this.canvas.getContext('2d');
        this.resizeCanvas();
      }

      resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = window.innerWidth * dpr;
        this.canvas.height = window.innerHeight * dpr;
        this.canvas.style.width = `${window.innerWidth}px`;
        this.canvas.style.height = `${window.innerHeight}px`;
        this.ctx.scale(dpr, dpr);
      }

      createBeam() {
        const angle = -35 + Math.random() * 10;
        return {
          x: Math.random() * this.canvas.width * 1.5 - this.canvas.width * 0.25,
          y: Math.random() * this.canvas.height * 1.5 - this.canvas.height * 0.25,
          width: 30 + Math.random() * 60,
          length: this.canvas.height * 2.5,
          angle: angle,
          speed: 0.6 + Math.random() * 1.2,
          opacity: 0.12 + Math.random() * 0.16,
          hue: 190 + Math.random() * 70,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: 0.02 + Math.random() * 0.03,
        };
      }

      setupBeams() {
        const totalBeams = this.options.minBeams * 1.5;
        this.beams = Array.from({ length: totalBeams }, () => this.createBeam());
      }

      resetBeam(beam, index) {
        const column = index % 3;
        const spacing = this.canvas.width / 3;

        beam.y = this.canvas.height + 100;
        beam.x = column * spacing + spacing / 2 + (Math.random() - 0.5) * spacing * 0.5;
        beam.width = 100 + Math.random() * 100;
        beam.speed = 0.5 + Math.random() * 0.4;
        beam.hue = 190 + (index * 70) / this.beams.length;
        beam.opacity = 0.2 + Math.random() * 0.1;
        return beam;
      }

      drawBeam(beam) {
        this.ctx.save();
        this.ctx.translate(beam.x, beam.y);
        this.ctx.rotate((beam.angle * Math.PI) / 180);

        // Calculate pulsing opacity
        const pulsingOpacity = beam.opacity * (0.8 + Math.sin(beam.pulse) * 0.2) * this.opacityMap[this.options.intensity];

        const gradient = this.ctx.createLinearGradient(0, 0, 0, beam.length);

        // Enhanced gradient with multiple color stops
        gradient.addColorStop(0, `hsla(${beam.hue}, 85%, 65%, 0)`);
        gradient.addColorStop(0.1, `hsla(${beam.hue}, 85%, 65%, ${pulsingOpacity * 0.5})`);
        gradient.addColorStop(0.4, `hsla(${beam.hue}, 85%, 65%, ${pulsingOpacity})`);
        gradient.addColorStop(0.6, `hsla(${beam.hue}, 85%, 65%, ${pulsingOpacity})`);
        gradient.addColorStop(0.9, `hsla(${beam.hue}, 85%, 65%, ${pulsingOpacity * 0.5})`);
        gradient.addColorStop(1, `hsla(${beam.hue}, 85%, 65%, 0)`);

        this.ctx.fillStyle = gradient;
        this.ctx.fillRect(-beam.width / 2, 0, beam.width, beam.length);
        this.ctx.restore();
      }

      animate = () => {
        if (!this.canvas || !this.ctx) return;

        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        this.beams.forEach((beam, index) => {
          beam.y -= beam.speed;
          beam.pulse += beam.pulseSpeed;

          // Reset beam when it goes off screen
          if (beam.y + beam.length < -100) {
            this.resetBeam(beam, index);
          }

          this.drawBeam(beam);
        });

        this.animationFrame = requestAnimationFrame(this.animate);
      }

      bindEvents() {
        const handleResize = () => {
          this.resizeCanvas();
          this.setupBeams();
        };

        window.addEventListener('resize', handleResize);
      }

      destroy() {
        if (this.animationFrame) {
          cancelAnimationFrame(this.animationFrame);
        }
        if (this.canvas) {
          this.canvas.remove();
        }
      }
    }

    // Initialize beams background
    document.addEventListener('DOMContentLoaded', () => {
      window.beamsBackground = new BeamsBackground({
        intensity: 'strong',
        blur: 35
      });
    });
  </script>
</body>
</html>
