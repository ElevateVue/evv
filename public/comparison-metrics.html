<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparison Metrics • EVV</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
  <script defer src="client-hub-tracker.js"></script>
  <script defer src="footer.js"></script>
  <style>
    .upload-card { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px; }
    .upload-panel { background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:24px; }
    .upload-panel h2 { margin:0 0 10px; }
    .upload-field { width:100%; padding:12px; border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.02); color:var(--text); }
    .summary-block { display:grid; gap:14px; margin-top:24px; }
    .metric-card { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:18px; }
    .metric-card h3 { margin-top:0; }
    .compare-button { margin-top:18px; }
    .result-panel { display:grid; gap:16px; margin-top:18px; }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand"><img src="/orbit-logo.svg" alt="Orbit" class="brand-badge" /><div><div class="brand-name">Orbit</div><div class="brand-sub">by Elevate Vue</div></div><button class="icon-btn" id="closeSidebar">×</button></div>
    <nav class="side-nav" id="sidebarNavRoot"></nav>
    <div class="account-card"><div class="avatar">C</div><div><div class="name">Compare Metrics</div><div class="email">Compare two exports</div></div></div>
  </aside>
  <div class="page">
    <header class="topbar">
      <button class="icon-btn" id="openSidebar" aria-label="Open menu">☰</button>
      <div class="brand-inline"><img src="/orbit-logo.svg" alt="Orbit" class="brand-badge" /><div class="brand-name">Orbit <span class="brand-sub">by Elevate Vue</span></div></div>
      <div class="spacer"></div>
      <div class="avatar small">C</div>
    </header>
    <main>
      <section class="panel">
        <div class="panel-head overview-head">
          <div class="overview-copy">
            <h1>Comparison Metrics</h1>
            <p>Upload two CSV exports for the same platform and get direct metric comparison plus strengths, weaknesses, and next steps.</p>
          </div>
        </div>
        <div class="upload-card">
          <div class="upload-panel">
            <h2>File One</h2>
            <input type="file" id="fileOne" class="upload-field" accept=".csv" />
          </div>
          <div class="upload-panel">
            <h2>File Two</h2>
            <input type="file" id="fileTwo" class="upload-field" accept=".csv" />
          </div>
        </div>
        <div class="upload-panel">
          <label for="platformInput">Platform</label>
          <input id="platformInput" class="upload-field" placeholder="Instagram, Facebook, LinkedIn" />
          <button id="compareBtn" class="pill-btn compare-button">Compare Files</button>
        </div>
        <div class="result-panel" id="comparisonResults"></div>
      </section>
    </main>
  </div>
  <script>
    async function readFileText(input) {
      const file = input.files[0];
      if (!file) return null;
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsText(file);
      });
    }

    const compareBtn = document.getElementById('compareBtn');
    compareBtn?.addEventListener('click', async () => {
      const fileOneText = await readFileText(document.getElementById('fileOne'));
      const fileTwoText = await readFileText(document.getElementById('fileTwo'));
      const platform = document.getElementById('platformInput').value.trim();
      if (!fileOneText || !fileTwoText || !platform) {
        alert('Please upload both CSV files and enter a platform.');
        return;
      }
      compareBtn.disabled = true;
      compareBtn.textContent = 'Comparing...';
      try {
        const response = await fetch('/api/compare-metrics', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ platform, fileOne: fileOneText, fileTwo: fileTwoText }),
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.message || 'Comparison failed');
        const container = document.getElementById('comparisonResults');
        container.innerHTML = '';
        const sections = [
          { title: 'File One Summary', content: JSON.stringify(result.fileOneSummary, null, 2) },
          { title: 'File Two Summary', content: JSON.stringify(result.fileTwoSummary, null, 2) },
          { title: 'Strengths', content: (result.strengths || []).join('\n\n') },
          { title: 'Weaknesses', content: (result.weaknesses || []).join('\n\n') },
          { title: 'Recommendations', content: (result.recommendations || []).join('\n\n') },
        ];
        sections.forEach((section) => {
          const card = document.createElement('div');
          card.className = 'metric-card';
          const heading = document.createElement('h3');
          heading.textContent = section.title;
          const pre = document.createElement('pre');
          pre.style.whiteSpace = 'pre-wrap';
          pre.style.margin = '12px 0 0';
          pre.textContent = section.content || 'No content available.';
          card.appendChild(heading);
          card.appendChild(pre);
          container.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        alert(error.message || 'Comparison failed');
      } finally {
        compareBtn.disabled = false;
        compareBtn.textContent = 'Compare Files';
      }
    });
  </script>
</body>
</html>
