<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Dock Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: white;
      padding: 20px;
    }
    .dock {
      display: flex;
      gap: 10px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      justify-content: center;
    }
    .dock-item {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 25px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transform-origin: center;
      transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .dock-item:hover {
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
  <h1>Animated Dock Effect Test</h1>
  <p>Move your mouse over the buttons below to see the scaling effect:</p>

  <div class="dock">
    <button class="dock-item">Dashboard</button>
    <button class="dock-item">Connect</button>
    <button class="dock-item">Upload</button>
    <button class="dock-item">Reports</button>
    <button class="dock-item">Settings</button>
  </div>

  <script>
    // Animated Dock Effect Class
    class AnimatedDock {
      constructor(containerSelector, options = {}) {
        this.container = document.querySelector(containerSelector);
        if (!this.container) return;

        this.options = {
          maxScale: options.maxScale || 1.5,
          minScale: options.minScale || 1.0,
          range: options.range || 150,
          stiffness: options.stiffness || 0.1,
          damping: options.damping || 0.8,
          ...options
        };

        this.mouseX = 0;
        this.mouseY = 0;
        this.items = Array.from(this.container.children).filter(el =>
          el.tagName !== 'SCRIPT' && el.tagName !== 'STYLE'
        );

        this.init();
      }

      init() {
        // Track mouse movement
        this.container.addEventListener('mousemove', (e) => {
          const rect = this.container.getBoundingClientRect();
          this.mouseX = e.clientX - rect.left;
          this.mouseY = e.clientY - rect.top;
          this.updateItems();
        });

        this.container.addEventListener('mouseleave', () => {
          this.mouseX = Infinity;
          this.mouseY = Infinity;
          this.updateItems();
        });

        // Initial state
        this.updateItems();
      }

      updateItems() {
        this.items.forEach((item, index) => {
          const rect = item.getBoundingClientRect();
          const containerRect = this.container.getBoundingClientRect();

          // Calculate center of item relative to container
          const itemCenterX = rect.left + rect.width / 2 - containerRect.left;
          const itemCenterY = rect.top + rect.height / 2 - containerRect.top;

          // Calculate distance from mouse to item center
          const distance = Math.sqrt(
            Math.pow(this.mouseX - itemCenterX, 2) +
            Math.pow(this.mouseY - itemCenterY, 2)
          );

          // Calculate scale based on distance
          const scale = this.calculateScale(distance);

          // Apply transform with smooth transition
          item.style.transform = `scale(${scale})`;
          item.style.transition = `transform ${this.options.stiffness * 1000}ms cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
        });
      }

      calculateScale(distance) {
        if (distance === Infinity) return this.options.minScale;

        // Scale decreases with distance, with smooth falloff
        const normalizedDistance = Math.min(distance / this.options.range, 1);
        const scaleRange = this.options.maxScale - this.options.minScale;
        const scale = this.options.maxScale - (normalizedDistance * scaleRange);

        return Math.max(scale, this.options.minScale);
      }
    }

    // Initialize the test dock
    document.addEventListener('DOMContentLoaded', () => {
      new AnimatedDock('.dock', {
        maxScale: 1.3,
        minScale: 1.0,
        range: 120
      });
    });
  </script>
</body>
</html>
