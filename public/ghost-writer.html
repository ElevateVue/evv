<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost Writer - Content Lab</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
  <script defer src="client-hub-tracker.js"></script>
  <script defer src="footer.js"></script>
  <script defer src="content-lab.js"></script>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand"><img src="/orbit-logo.svg" alt="Orbit" class="brand-badge" /><div><div class="brand-name">Orbit</div><div class="brand-sub">by Elevate Vue</div></div><button class="icon-btn" id="closeSidebar" aria-label="Close menu">&times;</button></div>
    <nav class="side-nav" id="sidebarNavRoot"></nav>
    <div class="account-card"><div class="avatar">C</div><div><div class="name">Content Lab</div><div class="email">Create better campaigns</div></div></div>
  </aside>
  <div class="page">
    <header class="topbar">
      <button class="icon-btn" id="openSidebar" aria-label="Open menu">&#9776;</button>
      <div class="brand-inline"><img src="/orbit-logo.svg" alt="Orbit" class="brand-badge" /><div class="brand-name">Orbit <span class="brand-sub">by Elevate Vue</span></div></div>
      <div class="spacer"></div>
      <div class="avatar small">C</div>
    </header>
    <main>
      <section class="content-tool-shell">
        <header class="content-tool-head">
          <div>
            <h1>Ghost Writer</h1>
            <p>Generate long-form, platform-ready content with tone, audience, and key points.</p>
          </div>
          <nav class="content-tabs" aria-label="Content tools">            <a href="content-calendar.html">Calendar</a>
            <a class="active" href="ghost-writer.html">Ghost Writer</a>
            <a href="hook-library.html">Hooks</a>
            <a href="drop-ideas.html">Ideas</a>
          </nav>
        </header>
        <section class="content-tool-panel">
          <div class="content-form-grid">
            <input id="gwTopic" class="brand-field" placeholder="What do you want to write about?" />
            <input id="gwAudience" class="brand-field" placeholder="Target audience (optional)" />
            <select id="gwPlatform" class="brand-select"><option>LinkedIn Article</option><option>Blog Post</option><option>Instagram Caption</option></select>
            <select id="gwTone" class="brand-select"><option>Professional</option><option>Casual</option><option>Inspirational</option></select>
            <select id="gwLength" class="brand-select"><option value="short">Short</option><option value="medium" selected>Medium</option><option value="long">Long</option></select>
            <input id="gwKeyPoints" class="brand-field" placeholder="Key points to cover, comma separated" />
          </div>
          <div class="content-ai-actions">
            <button id="gwWriteBtn" class="brand-btn" type="button">Write Content</button>
            <button id="gwSaveBtn" class="copy-btn" type="button">Save</button>
            <button id="gwCopyBtn" class="copy-btn" type="button">Copy</button>
          </div>
          <textarea id="gwOutput" class="brand-textarea content-output" placeholder="Generated content appears here"></textarea>
        </section>
      </section>
    </main>
  </div>
  <div class="beams-overlay"></div>
</body>
</html>
